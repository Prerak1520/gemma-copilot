<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Gemma Copilot</title>
  <style>
    body { font: 13px/1.4 -apple-system, system-ui, sans-serif; width: 360px; margin: 0; padding: 12px; color: #111; }
    h1 { font-size: 14px; margin: 0 0 8px; display: flex; align-items: center; gap: 8px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #aaa; }
    .dot.ok { background: #2ecc71; } .dot.bad { background: #e74c3c; }
    button { font: inherit; padding: 6px 10px; border: 1px solid #ccc; background: #fafafa; border-radius: 6px; cursor: pointer; }
    button.primary { background: #111; color: #fff; border-color: #111; }
    button:disabled { opacity: 0.5; cursor: default; }
    .row { display: flex; gap: 6px; margin-top: 8px; }
    .row.wrap { flex-wrap: wrap; }
    pre { background: #f5f5f5; padding: 8px; border-radius: 6px; max-height: 320px; overflow: auto; white-space: pre-wrap; word-break: break-word; }
    .score { font-size: 22px; font-weight: 700; }
    .pill { display: inline-block; padding: 2px 6px; border-radius: 10px; background: #eee; font-size: 11px; margin-right: 4px; }
    .pill.high { background: #ffd6d6; } .pill.med { background: #fff3cd; } .pill.low { background: #e7f5ff; }
    .muted { color: #666; font-size: 11px; }
    .hidden { display: none; }
    select, textarea { font: inherit; padding: 5px 8px; border: 1px solid #ccc; border-radius: 6px; background: #fafafa; }
    textarea { width: 100%; min-height: 54px; resize: vertical; margin-top: 8px; }
    .warning { color: #8a5a00; background: #fff8df; border: 1px solid #ffe08a; padding: 6px 8px; border-radius: 6px; margin-top: 8px; }
    .resume-section { margin-top: 10px; border-top: 1px solid #eee; padding-top: 10px; }
  </style>
</head>
<body>
  <h1><span id="status-dot" class="dot"></span> Gemma Copilot <span class="muted" id="model-info"></span></h1>

  <div class="row">
    <button id="analyze-btn" class="primary">Analyze this JD</button>
    <button id="retry-btn" class="hidden">Retry</button>
  </div>
  <div id="stage" class="muted" style="margin-top: 6px;"></div>
  <div id="scrape-warning" class="warning hidden"></div>

  <div id="output" class="hidden" style="margin-top: 10px;">
    <div><span class="score" id="score"></span> <span class="muted" id="rec"></span></div>
    <div id="summary" class="muted" style="margin-top: 4px;"></div>
    <div id="flags" style="margin-top: 8px;"></div>
    <div id="memory-cited" class="muted" style="margin-top: 8px;"></div>
    <textarea id="fb-note" placeholder="Optional feedback note for reflection"></textarea>
    <div class="row wrap" style="margin-top: 8px;">
      <button id="up-btn">👍 Useful</button>
      <button id="down-btn">👎 Off</button>
      <span class="muted" id="fb-status"></span>
    </div>
    <details style="margin-top: 8px;"><summary class="muted">Raw JSON</summary><pre id="raw"></pre></details>

    <div class="resume-section">
      <div class="muted" style="margin-bottom: 6px;">Generate tailored resume</div>
      <div class="row">
        <select id="template-select">
          <option value="">Loading…</option>
        </select>
        <button id="resume-btn">Generate PDF</button>
      </div>
      <div id="resume-status" class="muted" style="margin-top: 4px;"></div>
    </div>
  </div>

  <div id="error" class="hidden" style="color: #c00; margin-top: 8px;"></div>

  <script src="popup.js"></script>
</body>
</html>
